version: "2.4"
services:
  db:
    image: mysql:8.0 # 使用するMySQLのバージョン
    container_name: TS_mysql8_container # コンテナ名
    environment:
      MYSQL_ROOT_PASSWORD: rootpass # ルートユーザーのパスワード
      LANG: C.UTF-8 # 言語設定
    volumes:
      # ホストのinit.sqlをDocker側で実行(データが初めて作成される時のみ)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # データを永続化するボリュームをマウント
      - mysql8_data:/var/lib/mysql
    ports:
      - "3307:3306" # ホストの3306ポートをコンテナの3307にマッピング

  backend:
    build:
      context: ./TaskSmasherBack
      dockerfile: Dockerfile_back
    # container_name: TS_tomcat11_container
    ports:
      - "8082:8080"
    volumes:
      - ./TaskSmasherBack:/app
      - ./TaskSmasherBack/.gradle:/home/gradle/.gradle # Gradle のキャッシュ共有（ビルド高速化）
    depends_on:
      - db
    stdin_open: true
    tty: true
    restart: "no" # 起動失敗時に再起動を抑止

  frontend:
    build:
      context: ./TaskSmasherFront
      dockerfile: Dockerfile_front
    ports:
      - "5173:5173"
    volumes:
      - ./TaskSmasherFront:/app
      - tasksmasher_node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  mysql8_data: # データベースの永続化用ボリューム
  tasksmasher_node_modules:
